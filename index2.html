<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الإدارة الاستراتيجية - 50 سؤال MCQ</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; border-bottom: 3px solid var(--secondary); padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #666; }
        .question-card { display: none; }
        .question-card.active { display: block; animation: slideIn 0.4s; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .question-text { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; line-height: 1.6; }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; background: #fff; cursor: pointer; text-align: right; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover:not([disabled]) { border-color: var(--secondary); background: #f0f7ff; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        .nav { margin-top: 25px; display: flex; justify-content: flex-end; }
        .next-btn { padding: 10px 30px; background: var(--secondary); color: white; border: none; border-radius: 8px; cursor: pointer; visibility: hidden; font-weight: bold; }
        #result-area { text-align: center; display: none; }
        .final-score { font-size: 3rem; color: var(--secondary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>اختبار الإدارة الاستراتيجية (50 سؤال اختيار)</h1>
    
    <div id="quiz-box">
        <div class="stats">
            <span>السؤال: <span id="q-num">1</span> / 50</span>
            <span>النتيجة: <span id="live-score">0</span></span>
        </div>
        <div id="questions-container"></div>
        <div class="nav">
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
        </div>
    </div>

    <div id="result-area">
        <h2>انتهى الاختبار!</h2>
        <p>درجتك النهائية هي:</p>
        <div class="final-score" id="final-val">0</div>
        <button class="opt-btn" style="margin:auto" onclick="location.reload()">إعادة الاختبار</button>
    </div>
</div>

<script>
    const data = [
        { q: "أصل كلمة 'استراتيجية' يعود إلى:", opts: ["العربية", "اليونانية", "اللاتينية", "الفرنسية"], a: 1 },
        { q: "أي من التعريفات التالية يصف الإدارة الاستراتيجية بدقة؟", opts: ["التركيز على العمليات اليومية", "عملية متكاملة لتحليل البيئة وصياغة الاستراتيجية وتنفيذها", "اتخاذ القرارات التشغيلية فقط", "إدارة الموارد البشرية بمعزل عن الأهداف"], a: 1 },
        { q: "الرؤية الاستراتيجية توضع عادةً لفترة زمنية تتراوح بين:", opts: ["شهر إلى 6 أشهر", "سنة واحدة فقط", "5 إلى 10 سنوات أو أطول", "شهرين إلى 3 أشهر"], a: 2 },
        { q: "أي مما يلي يُعد من المفاهيم الأساسية للإدارة الاستراتيجية؟", opts: ["الربح الفوري وتجنب المخاطرة", "الرؤية والرسالة والقيم والميزة التنافسية", "التركيز على المبيعات اليومية", "إدارة الموارد بمعزل عن الاستراتيجية"], a: 1 },
        { q: "الميزة التنافسية للمنظمة يجب أن تكون:", opts: ["مؤقتة ومتغيرة أسبوعياً", "سرية لا يعلمها إلا الإدارة", "حقيقية وملموسة ومستدامة", "محصورة في الجانب المالي"], a: 2 },
        { q: "أي من التالي يُجيب عليه تحديد الرسالة المؤسسية؟", opts: ["أين نريد أن نكون بعد 10 سنوات؟", "من نحن؟ وماذا نفعل؟ ومن عملاؤنا؟", "كم ربحنا هذا العام؟", "كيف سنواجه المنافسين؟"], a: 1 },
        { q: "عدد القيم الأساسية الموصى به هو:", opts: ["10 قيم أو أكثر", "3 إلى 5 قيم فقط", "لا يوجد حد محدد", "قيمة واحدة فقط"], a: 1 },
        { q: "معيار 'R' في نموذج SMART يعني:", opts: ["Real", "Relevant", "Rapid", "Rational"], a: 1 },
        { q: "أي من التالي يعكس أهمية الإدارة الاستراتيجية؟", opts: ["تقليل الموظفين لرفع الأرباح", "توفير رؤية واضحة وتحسين الكفاءة", "تجنب التغيير والمخاطرة", "التركيز على المدى القصير"], a: 1 },
        { q: "الموارد البشرية في الإدارة الاستراتيجية تعد:", opts: ["عاملاً ثانوياً", "مسؤولية قسم الموارد فقط", "قلب وروح تنفيذ أي استراتيجية", "عبئاً مالياً"], a: 2 },
        { q: "ما العلاقة بين التخطيط الاستراتيجي والإدارة الاستراتيجية؟", opts: ["مترادفان تماماً", "التخطيط جزء من الإدارة الاستراتيجية", "الإدارة جزء من التخطيط", "لا توجد علاقة"], a: 1 },
        { q: "تتضمن الإدارة الاستراتيجية ولا يتضمنه التخطيط وحده:", opts: ["الرؤية المستقبلية", "التنفيذ والمراقبة والتقييم والتعديل", "تحديد الأهداف", "دراسة المنافسين"], a: 1 },
        { q: "التخطيط الاستراتيجي يركز بشكل رئيسي على:", opts: ["صياغة الاستراتيجية وتحديد المسارات", "تنفيذ القرارات اليومية", "تقييم الأداء وقياسه", "إدارة التغيير"], a: 0 },
        { q: "يميز الإدارة الاستراتيجية عن التخطيط الاستراتيجي:", opts: ["استخدام SWOT", "كونها عملية دورية تشمل التنفيذ والمراقبة والتعديل", "الاهتمام برضا العملاء", "تحديد الرسالة"], a: 1 },
        { q: "أي تعريف يصف التخطيط الاستراتيجي تحديداً؟", opts: ["دورة مستمرة من التحليل والتنفيذ", "عملية صياغة الأهداف والمسارات المراد اتباعها", "إدارة يومية للعمليات", "قياس مؤشرات الأداء"], a: 1 },
        { q: "الخطوة الأولى في تطوير الاستراتيجية هي:", opts: ["تحديد الأهداف مباشرة", "تقييم الوضع الحالي بشكل شامل وموضوعي", "تطوير البدائل", "إعداد الخطة التنفيذية"], a: 1 },
        { q: "تطوير بدائل استراتيجية متعددة يهدف إلى:", opts: ["إرباك الموظفين", "تقييم الخيارات واختيار الأنسب", "إثبات إبداع الإدارة", "تجنب الالتزام بخطة واحدة"], a: 1 },
        { q: "معيار التقييم عند اختيار البديل الاستراتيجي يشمل:", opts: ["الأرباح المالية فقط", "الموارد والعوائد والمخاطر والتوافق مع الرؤية", "سرعة التنفيذ", "رغبات مدير القسم"], a: 1 },
        { q: "مرحلة 'تطوير الخطة التنفيذية' تُعنى بـ:", opts: ["إعادة تحليل SWOT", "ترجمة الاستراتيجية لإجراءات ومسؤوليات وموارد", "تعديل الرؤية والرسالة", "تدريب الإدارة العليا فقط"], a: 1 },
        { q: "من مزايا تشارك الموارد البشرية في الصياغة:", opts: ["تأخير اتخاذ القرارات", "زيادة الالتزام وتقليل مقاومة التغيير", "تقليل صلاحيات الإدارة", "تعقيد العملية"], a: 1 },
        { q: "الخطة التنفيذية الجيدة تُقسم لمراحل زمنية:", opts: ["يومية وأسبوعية", "قصيرة ومتوسطة وطويلة الأجل", "سنوية فقط", "عشوائية"], a: 1 },
        { q: "أي من التالي ليس من خطوات تطوير الاستراتيجية؟", opts: ["تحليل البيئة الخارجية", "تحديد الأهداف", "توزيع الأرباح على المساهمين", "تطوير البدائل"], a: 2 },
        { q: "التحليل الداخلي يركز على:", opts: ["دراسة المنافسين", "تقييم الموارد والعمليات الداخلية", "رصد الاقتصاد العالمي", "تحليل اتجاهات المستهلكين"], a: 1 },
        { q: "التحليل الخارجي يهتم بـ:", opts: ["كفاءة العمليات", "البيئة الاقتصادية والتكنولوجية والتنافسية", "رضا الموظفين", "الهيكل التنظيمي"], a: 1 },
        { q: "آليات التشارك الفعال تشمل:", opts: ["توجيه القرارات من الأعلى فقط", "ورش عمل واستطلاعات رأي ولجان ممثلة", "الاستعانة بخبراء فقط", "آراء مديري الأقسام فقط"], a: 1 },
        { q: "ماذا تعني حروف SWOT؟", opts: ["استراتيجية، عمل، أهداف، زمن", "قوة، ضعف، فرص، تهديدات", "مبيعات، أرباح، عمليات، تكنولوجيا", "رؤية، رسالة، أهداف، قيم"], a: 1 },
        { q: "نقاط الضعف في SWOT تشير إلى:", opts: ["ظروف خارجية سلبية", "جوانب داخلية تقصر فيها المنظمة", "تهديدات بيئية", "فرص غير مستثمرة"], a: 1 },
        { q: "مثال على الفرص الخارجية في SWOT:", opts: ["علامة تجارية قوية", "نمو السوق وتقنيات جديدة", "محدودية الموارد", "ضعف البحث والتطوير"], a: 1 },
        { q: "التهديدات في SWOT تشمل:", opts: ["كفاءة الموارد والخبرة", "دخول منافس قوي وأزمات اقتصادية", "امتلاك تكنولوجيا متقدمة", "رضا العملاء"], a: 1 },
        { q: "نقاط القوة في SWOT قد تشمل:", opts: ["ضعف العلامة التجارية", "الموارد القوية والفريق المتميز والعلامة المشهورة", "تغير احتياجات العملاء", "تطورات خارجية"], a: 1 },
        { q: "استخدام SWOT في اتخاذ القرارات من خلال:", opts: ["اختيار موظفين فقط", "استثمار القوة لاستغلال الفرص ومواجهة التهديدات", "تحديد ميزانية التسويق", "إعداد تقارير مالية"], a: 1 },
        { q: "علامة تجارية قوية تُصنف ضمن:", opts: ["الفرص", "نقاط القوة", "التهديدات", "نقاط الضعف"], a: 1 },
        { q: "التحليل الداخلي في SWOT يتضمن دراسة:", opts: ["البيئة الاقتصادية", "الموارد والعمليات الداخلية", "استراتيجيات المنافسين", "التشريعات والقوانين"], a: 1 },
        { q: "التحليل الخارجي في SWOT يركز على:", opts: ["كفاءة الموظفين", "الفرص والتهديدات في البيئة المحيطة", "جودة المنتجات", "الهيكل التنظيمي"], a: 1 },
        { q: "الغرض الأساسي من SWOT هو:", opts: ["قائمة بمشاكل الموظفين", "صورة شاملة للوضع لدعم القرارات", "تقييم جودة المنتج فقط", "إعداد الميزانية السنوية"], a: 1 },
        { q: "المراحل الأربعة بالترتيب الصحيح:", opts: ["تنفيذ، تحليل، صياغة، مراقبة", "تحليل، صياغة، تنفيذ، مراقبة وتعديل", "صياغة، تنفيذ، تحليل، تعديل", "مراقبة، تنفيذ، صياغة، تحليل"], a: 1 },
        { q: "تتضمن مرحلة التحليل والتقييم:", opts: ["اختيار استراتيجية التسعير", "تحليل البيئة وفهم الوضع الراهن بعمق", "تدريب الموظفين", "قياس أداء الاستراتيجية"], a: 1 },
        { q: "جانب أساسي من التنفيذ الاستراتيجي:", opts: ["إعادة صياغة الرؤية من الصفر", "تطوير خطط تشغيلية وتخصيص موارد وإدارة تغيير", "تحليل المنافسين", "إعداد تقارير الأداء"], a: 1 },
        { q: "تطبيق الإدارة الاستراتيجية يتطلب من القيادة:", opts: ["تفويض القرارات للوسطى فقط", "التزاماً حقيقياً ودفع التنفيذ بقوة", "إبقاء الاستراتيجية سرية", "تجنب تغيير الهياكل"], a: 1 },
        { q: "عامل حاسم لنجاح تطبيق الاستراتيجية:", opts: ["استراتيجية معقدة", "موارد بشرية مؤهلة وتواصل واضح", "تجاهل مقاومة التغيير", "تركيز حصري على المال"], a: 1 },
        { q: "المراقبة والتقييم تهدف إلى:", opts: ["إعادة صياغة الخطة سنوياً", "تأكد من سير التنفيذ واتخاذ إجراءات تصحيحية", "تعيين موظفين جدد", "توزيع الأرباح"], a: 1 },
        { q: "العلاقة بين الإدارة الاستراتيجية والموارد البشرية:", opts: ["منفصلة تماماً", "تكاملية عميقة (لا نجاح بدون الموارد)", "تنافسية", "ثانوية تظهر عند التنفيذ فقط"], a: 1 },
        { q: "إدارة التغيير تبدأ بـ:", opts: ["إصدار قرارات إلزامية فوراً", "إنشاء الوعي بالحاجة للتغيير وفوائده", "تسريح المقاومين", "إعادة هيكلة الأجور"], a: 1 },
        { q: "تنفيذ التحول الرقمي (مثال STC) يشمل:", opts: ["تجميد التوظيف", "استثمار في التكنولوجيا وتدريب الموظفين وتواصل شفاف", "الانسحاب من الاتصالات", "إلغاء الخدمات التقليدية دفعة واحدة"], a: 1 },
        { q: "استراتيجية لزيادة المبيعات (أمثلة الكتاب):", opts: ["تقليص المنتجات", "توسع جغرافي أو تطوير منتجات أو استحواذ", "رفع الأسعار بتسارع", "تقليل الإنفاق على العملاء"], a: 1 },
        { q: "من مؤشرات الأداء المالية KPIs:", opts: ["الإيرادات والأرباح والعائد على الاستثمار", "رضا العملاء", "دوران الموظفين", "براءات الاختراع"], a: 0 },
        { q: "من خصائص KPIs الجيدة:", opts: ["كثيرة العدد", "قابلة للقياس وذات صلة ومحدودة العدد", "سرية", "تتغير شهرياً"], a: 1 },
        { q: "KPIs المتعلقة بالعملاء تشمل:", opts: ["هامش الربح", "رضا العملاء وحصة السوق", "إنتاجية الموظفين", "براءات الاختراع"], a: 1 },
        { q: "لوحات القيادة (Dashboards) تستخدم لـ:", opts: ["تدريب الموظفين", "عرض KPIs بشكل بصري واضح", "إعداد عروض للعملاء", "أرشفة الوثائق"], a: 1 },
        { q: "تطوير KPIs الفعالة يبدأ بـ:", opts: ["مراجعة أداء الموظفين", "الربط بالأهداف الاستراتيجية أولاً", "مقارنة KPIs المنافسين", "برامج حاسوب تختار تلقائياً"], a: 1 }
    ];

    let current = 0, score = 0, answered = false;

    function init() {
        const wrapper = document.getElementById('questions-container');
        data.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = `question-card ${idx === 0 ? 'active' : ''}`;
            div.id = `q-${idx}`;
            div.innerHTML = `<div class="question-text">${item.q}</div><div class="options">` +
                item.opts.map((o, i) => `<button class="opt-btn" onclick="check(${idx},${i},this)">${o}</button>`).join('') +
                `</div>`;
            wrapper.appendChild(div);
        });
    }

    function check(qIdx, oIdx, btn) {
        if (answered) return;
        answered = true;
        const correct = data[qIdx].a;
        const btns = btn.parentElement.querySelectorAll('.opt-btn');
        if (oIdx === correct) { score++; btn.classList.add('correct'); }
        else { btn.classList.add('wrong'); btns[correct].classList.add('correct'); }
        document.getElementById('live-score').innerText = score;
        document.getElementById('next-btn').style.visibility = "visible";
    }

    function nextQuestion() {
        document.getElementById(`q-${current}`).classList.remove('active');
        current++; answered = false;
        document.getElementById('next-btn').style.visibility = "hidden";
        if (current < data.length) {
            document.getElementById(`q-${current}`).classList.add('active');
            document.getElementById('q-num').innerText = current + 1;
        } else {
            document.getElementById('quiz-box').style.display = "none";
            document.getElementById('result-area').style.display = "block";
            document.getElementById('final-val').innerText = `${score} / 50`;
        }
    }
    init();
</script>
</body>
</html>
